name: 构建 APK

on:
  push:
  workflow_dispatch:

defaults:
  run:
    working-directory: ARVideoViewer

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - run: gradle wrapper --gradle-version 8.4
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ARVideoViewer-debug-apk
          path: ARVideoViewer/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
